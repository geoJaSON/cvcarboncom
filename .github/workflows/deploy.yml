name: Deploy to VPS

# Deploys on every push to main, and lets you trigger a deploy by hand from
# the Actions tab (Run workflow). The build happens ON the VPS via
# `docker compose up -d --build`; CADDY_NETWORK comes from the .env file
# sitting next to compose.yaml on the server.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once; a newer push cancels an in-flight one.
concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull + rebuild on the VPS over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # If your SSH port isn't 22, add: port: ${{ secrets.VPS_PORT }}
          # (v1 aborts on the first failed command by default — the old
          # script_stop input no longer exists.)
          script: |
            cd ~/cvcarboncom
            git pull --ff-only
            docker compose up -d --build
            docker image prune -f
            docker inspect cvcarbon-web --format 'health: {{.State.Health.Status}}'
